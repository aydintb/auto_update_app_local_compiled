name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: auto_update_app_local_compiled
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: auto_update_app_local_compiled.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: auto_update_app_local_compiled

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/auto_update_app_local_compiled-${{ matrix.target }}

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
